services:
  ai-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-model-tracker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persist SQLite database across container restarts
      - ./data:/app/data
    # Health check to verify bot is running
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
